<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Outer rings -->
  <circle cx="16" cy="16" r="14" stroke="#ffad1c" stroke-width="1" opacity="0.5"/>
  <circle cx="16" cy="16" r="12" stroke="#ffad1c" stroke-width="0.5" opacity="0.3"/>
  <!-- Cardinal spokes -->
  <line x1="16" y1="2" x2="16" y2="6" stroke="#ffad1c" stroke-width="1.5" opacity="0.6"/>
  <line x1="16" y1="26" x2="16" y2="30" stroke="#ffad1c" stroke-width="1.5" opacity="0.6"/>
  <line x1="2" y1="16" x2="6" y2="16" stroke="#ffad1c" stroke-width="1.5" opacity="0.6"/>
  <line x1="26" y1="16" x2="30" y2="16" stroke="#ffad1c" stroke-width="1.5" opacity="0.6"/>
  <!-- Compass diamond -->
  <polygon points="16,6 20,16 16,26 12,16" stroke="#ffad1c" stroke-width="1" fill="#ffad1c" fill-opacity="0.08" opacity="0.7"/>
  <!-- Inner cross lines -->
  <line x1="10" y1="10" x2="22" y2="22" stroke="#ffad1c" stroke-width="0.5" opacity="0.25"/>
  <line x1="22" y1="10" x2="10" y2="22" stroke="#ffad1c" stroke-width="0.5" opacity="0.25"/>
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="#ffad1c" opacity="0.5"/>
  <circle cx="16" cy="16" r="0.75" fill="#ffad1c" opacity="0.9"/>
</svg>
