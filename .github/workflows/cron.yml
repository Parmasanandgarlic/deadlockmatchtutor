name: 30-Minute Sync Cron Workflow

on:
  schedule:
    # Runs every 30 minutes
    - cron: '*/30 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Vercel Cron Sync Endpoint
        run: |
          curl -X GET "https://www.aftermatch.xyz/api/cron/sync" \
          -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
          --fail || echo "Sync endpoint failed or returned non-200, check Vercel logs"
