name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm run test:unit
      - name: Verify client build
        run: npm run build
      - name: Run server-backed API smoke test
        run: npm run test:ci:api
      - name: Install browser for smoke test
        run: npx playwright install --with-deps chromium
      - name: Run built-app browser smoke test
        run: npm run test:ci:browser
      - name: Run SAST scan
        run: npm run test:sast
